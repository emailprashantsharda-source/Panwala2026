<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="pragma" content="no-cache"/>
<meta http-equiv="expires" content="0"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>KrodAI – Ek Crore Ka Sapna</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" media="all"/>
<style>
:root{--p:#E65C00;--pd:#7A2800;--pl:#FFF3E8;--s:#2E7D32;--sl:#E8F5E9;--bg:#FFF8EE;--card:#fff;--t1:#1A0A00;--t2:#6B4226;--t3:#A0714F;--border:#F0DCC8;--r1:14px;--r2:20px;--r3:28px;--sh1:0 1px 3px rgba(100,40,0,.06),0 4px 12px rgba(100,40,0,.05);--f:"Plus Jakarta Sans","Segoe UI",system-ui,sans-serif;--fh:"Outfit","Plus Jakarta Sans",sans-serif}
.pf-grocery{--p:#2E7D32;--pd:#1B5E20;--pl:#E8F5E9}
.pf-teashop{--p:#d97706;--pd:#b45309;--pl:#fffbeb}
.pf-barber{--p:#7c3aed;--pd:#6d28d9;--pl:#f5f3ff}
.pf-dhaba{--p:#dc2626;--pd:#b91c1c;--pl:#fef2f2}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--f);background:var(--bg);max-width:480px;margin:0 auto;min-height:100vh;font-size:14px}
button,input,select,textarea{font-family:inherit;-webkit-appearance:none;outline:none;border:none}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.page{display:none;padding-bottom:84px}.page.active{display:block}
.card{background:#fff;border-radius:14px;padding:14px;box-shadow:0 1px 6px rgba(0,0,0,.07);margin-bottom:10px}
.inp{width:100%;border:2px solid var(--border);border-radius:14px;padding:14px 15px;font-size:16px;background:#FFFDF9;color:#1A0A00;display:block;margin-bottom:10px}
.inp:focus{border-color:var(--p)}
.lbl{display:block;font-size:11px;font-weight:700;color:#6b5c3e;margin-bottom:3px}
.pbtn{width:100%;padding:17px;border-radius:16px;font-weight:800;color:#fff;font-size:17px;cursor:pointer;margin-top:6px;display:block;text-align:center}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.hs{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.hs::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
.go{background:linear-gradient(150deg,#E65C00,#7A2800)}
.gp{background:linear-gradient(135deg,#7c3aed,#6d28d9)}
.ga{background:linear-gradient(135deg,#d97706,#b45309)}
.gc{background:linear-gradient(135deg,#0891b2,#0e7490)}
.gr{background:linear-gradient(135deg,#dc2626,#b91c1c)}
.gg{background:linear-gradient(135deg,#16a34a,#15803d)}
.gs{background:linear-gradient(135deg,#475569,#334155)}
#nav{position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;background:#fff;box-shadow:0 -2px 18px rgba(0,0,0,.12);display:flex;z-index:200}
.nt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 0 7px;gap:2px;background:none;color:#8B5E3C;position:relative;font-size:10px;font-weight:700;cursor:pointer}
.nt.on{color:#E65C00}
.ntb{position:absolute;top:0;left:50%;transform:translateX(-50%);width:24px;height:3px;border-radius:2px;background:#E65C00;display:none}
.nt.on .ntb{display:block}
.ni{font-size:24px}
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;align-items:flex-end;justify-content:center}
#ov.show{display:flex}
#md{background:#fff;width:100%;max-width:520px;border-radius:24px 24px 0 0;max-height:92vh;overflow-y:auto}
#mh{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #F0DCC8;position:sticky;top:0;background:#fff;z-index:1}
#mh b{font-size:15px}
#mc{width:30px;height:30px;border-radius:50%;background:#FFEBE0;cursor:pointer;font-size:16px;flex-shrink:0}
#mb{padding:18px}

/* ── App font size overrides for mobile readability ── */
*{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;box-sizing:border-box}
body,button,input,select,textarea{font-family:var(--f)!important;letter-spacing:-.01em}
#app,#app *{font-family:var(--f)!important}
.card{padding:16px;font-size:15px;border-radius:16px}
#nav .nt{font-size:11px;font-weight:800;letter-spacing:.01em;color:#8B5E3C}
#nav .nt.on{color:#E65C00}
#nav .ni{font-size:26px}
/* Outfit headings */
h1,h2,h3{font-weight:800;letter-spacing:-.02em;font-family:var(--fh)!important}
.qa-lbl{font-size:13px!important;font-weight:800!important;color:#1A0A00!important;margin-top:4px!important}
.qa-tile{border-radius:20px!important;padding:18px 8px 16px!important}
.qa-icon{width:62px!important;height:62px!important;border-radius:18px!important;font-size:30px!important}
#toast{display:none;position:fixed;top:16px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#E65C00,#7A2800);color:#fff;padding:11px 22px;border-radius:20px;font-weight:700;font-size:13px;z-index:9999;box-shadow:0 4px 16px rgba(122,40,0,.3);max-width:90vw;text-align:center}
#cb{display:none;position:fixed;bottom:62px;left:0;right:0;max-width:520px;margin:0 auto;z-index:150}
#ci{background:#fff;border-top:1px solid var(--border);padding:9px 13px;max-height:160px;overflow-y:auto;display:none}
#cf{background:#fff;padding:11px 13px;box-shadow:0 -2px 16px rgba(0,0,0,.1);display:flex;align-items:center;gap:10px}

.prof-tile{background:#fff;border-radius:20px;padding:16px 10px 12px;display:flex;flex-direction:column;align-items:center;gap:7px;box-shadow:var(--sh1);border:2px solid transparent;transition:all .2s;cursor:pointer}
.prof-tile.sel{border-color:var(--p);background:var(--pl)}
.prof-tile .ico{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px}
.prof-tile .lbl2{font-size:12px;font-weight:700;text-align:center;color:var(--t1);line-height:1.3}
.step{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all .3s}
.step.active{width:24px;border-radius:4px;background:var(--p)}
.qa-tile{background:var(--card);border-radius:var(--r2);padding:13px 6px 11px;display:flex;flex-direction:column;align-items:center;gap:5px;box-shadow:var(--sh1);border:none;transition:transform .12s;cursor:pointer}
.qa-tile:active{transform:scale(.93)}
.qa-icon{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px}
.qa-lbl{font-size:12px;font-weight:800;text-align:center;color:#1A0A00;line-height:1.3;letter-spacing:-.01em}
.mic-active{animation:pulse-mic 1s infinite!important;background:#ef4444!important;color:#fff!important}
@keyframes pulse-mic{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}50%{box-shadow:0 0 0 10px rgba(239,68,68,0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes popIn{0%{opacity:0;transform:translateX(-50%) scale(.88)}100%{opacity:1;transform:translateX(-50%) scale(1)}}
.page.active{animation:fadeUp .25s ease both}
#md{animation:slideUp .3s cubic-bezier(.22,1,.36,1) both}
#toast{animation:popIn .22s cubic-bezier(.22,1,.36,1)}
#onboarding{display:none;position:fixed;inset:0;background:#fff;z-index:500;flex-direction:column;align-items:center;overflow-y:auto}
</style>
</head>

<!-- Firebase Auth SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, RecaptchaVerifier, signInWithPhoneNumber, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ─── FIREBASE CONFIG (replace with your values) ───────────────
 const firebaseConfig = {
  apiKey: "AIzaSyB8v9gYxCg4qBfLl2J08D9TeUVygKVAqC8",
  authDomain: "panshopmanager.firebaseapp.com",
  projectId: "panshopmanager",
  storageBucket: "panshopmanager.firebasestorage.app",
  messagingSenderId: "448042777087",
  appId: "1:448042777087:web:003499456e27e4dbbccfca",
  measurementId: "G-M5MJTC0C88"
};

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  auth.useDeviceLanguage();

  // ─── RECAPTCHA ─────────────────────────────────────────────────
  function setupRecaptcha() {
    if (window.recaptchaVerifier) return; // reuse if exists
    window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
      size: 'invisible',
      callback: () => {},
      'expired-callback': () => {
        window.recaptchaVerifier = null;
      }
    });
  }

  // ─── SEND OTP ──────────────────────────────────────────────────
  window.sendOTP = async function() {
    const phone = document.getElementById('phone-input').value.trim();
    if (!/^[6-9]\d{9}$/.test(phone)) {
      showLoginError('Please enter a valid 10-digit Indian mobile number');
      return;
    }
    setLoginStatus('Sending OTP...', false);
    try {
      setupRecaptcha();
      const result = await signInWithPhoneNumber(auth, '+91' + phone, window.recaptchaVerifier);
      window.confirmationResult = result;
      document.getElementById('otp-section').style.display = 'block';
      document.getElementById('send-otp-btn').style.display = 'none';
      document.getElementById('phone-input').disabled = true;
      setLoginStatus('OTP sent to +91 ' + phone, false);
      document.getElementById('otp-input').focus();
    } catch (err) {
      console.error('sendOTP error:', err.code, err.message);
      // Destroy verifier so next attempt creates fresh one
      if (window.recaptchaVerifier) {
        try { window.recaptchaVerifier.clear(); } catch(e) {}
        window.recaptchaVerifier = null;
      }
      const rc = document.getElementById('recaptcha-container');
      if (rc) rc.innerHTML = '';
      showLoginError(friendlyError(err));
    }
  };

  // ─── VERIFY OTP ────────────────────────────────────────────────
  window.verifyOTP = async function() {
    const code = document.getElementById('otp-input').value.trim();
    if (code.length !== 6) {
      showLoginError('Enter the 6-digit OTP');
      return;
    }
    setLoginStatus('Verifying...', false);
    try {
      const result = await window.confirmationResult.confirm(code);
      const user = result.user;
      window.currentUserId = user.uid;
      await saveUserToFirestore(user);
      showApp();
    } catch (err) {
      console.error('verifyOTP error:', err);
      showLoginError(friendlyError(err));
    }
  };

  // ─── SAVE USER + SHOP TO FIRESTORE ─────────────────────────────
  async function saveUserToFirestore(user) {
    const userRef = doc(db, 'users', user.uid);
    const snap = await getDoc(userRef);
    if (!snap.exists()) {
      await setDoc(userRef, {
        phone: user.phoneNumber,
        createdAt: serverTimestamp()
      });
      // Create default shop for new user
      const shopRef = doc(db, 'shops', user.uid);
      await setDoc(shopRef, {
        ownerId: user.uid,
        name: 'My Pan Shop',
        createdAt: serverTimestamp()
      });
    }
  }

  // ─── AUTH STATE ────────────────────────────────────────────────
  onAuthStateChanged(auth, (user) => {
    if (user) {
      // Hide login immediately so no flash
      const ls = document.getElementById('login-screen');
      if (ls) ls.style.display = 'none';
      window.currentUserId = user.uid;
      showApp();
    } else {
      showLogin();
    }
  });

  // ─── UI HELPERS ────────────────────────────────────────────────
  function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    if(typeof window._showApp==='function'){window._showApp();}else{document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='block';if(typeof render==='function')render();}
  }
  function showLogin() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
  function showLoginError(msg) {
    const el = document.getElementById('login-msg');
    el.textContent = msg;
    el.style.color = '#dc2626';
    el.style.background = '#fef2f2';
    el.style.borderColor = '#fecaca';
    el.style.display = 'block';
  }
  function setLoginStatus(msg, isError) {
    const el = document.getElementById('login-msg');
    el.textContent = msg;
    el.style.color = isError ? '#dc2626' : '#15803d';
    el.style.background = isError ? '#fef2f2' : '#f0fdf4';
    el.style.borderColor = isError ? '#fecaca' : '#bbf7d0';
    el.style.display = 'block';
  }
  function friendlyError(err) {
    const code = err.code || '';
    const msg = (err.message || '').toLowerCase();
    if (code.includes('invalid-phone')) return 'Invalid phone number. 10-digit number enter karein';
    if (code.includes('too-many-requests') || msg.includes('too many')) return 'Bahut zyaada attempts. 30 minute baad try karein \u23F0';
    if (code.includes('invalid-verification-code')) return 'Wrong OTP. Dobara check karein \u274C';
    if (code.includes('code-expired')) return 'OTP expire ho gaya. Dobara bhejein \u1F504';
    if (code.includes('network')) return 'Network error. Internet check karein';
    if (msg.includes('recaptcha') || msg.includes('captcha')) return 'Page refresh karein aur dobara try karein \u1F504';
    if (code.includes('operation-not-allowed')) return 'Phone auth Firebase mein enable nahi hai. Firebase Console check karein';
    if (code.includes('captcha') || code.includes('recaptcha')) return 'reCAPTCHA error. Page refresh karein';
    if (code.includes('quota')) return 'Daily OTP limit exceed ho gayi. Kal try karein';
    // Show actual error code to help debug
    return 'Error: ' + (code || msg || 'unknown — page refresh karein');
  }
</script>

// Failsafe: if Firebase fails to load, show login after 3 seconds
setTimeout(function(){
  var ls = document.getElementById('login-screen');
  var app = document.getElementById('app');
  var ob = document.getElementById('onboarding');
  var nothingVisible = (!ls || ls.style.display==='none') &&
                       (!app || app.style.display==='none') &&
                       (!ob || ob.style.display==='none');
  if(nothingVisible && ls){
    ls.style.display = 'flex';
    console.warn('Failsafe: showing login screen — Firebase may have failed to init');
  }
}, 2000);
</script>

<script>
// Reset login form
function resetLogin() {
  document.getElementById('otp-section').style.display = 'none';
  document.getElementById('send-otp-btn').style.display = 'block';
  document.getElementById('phone-input').disabled = false;
  document.getElementById('phone-input').value = '';
  document.getElementById('otp-input').value = '';
  document.getElementById('login-msg').style.display = 'none';
  window.confirmationResult = null;
  if (window.recaptchaVerifier) {
    try { window.recaptchaVerifier.clear(); } catch(e) {}
    window.recaptchaVerifier = null;
  }
  const rc = document.getElementById('recaptcha-container');
  if (rc) rc.innerHTML = '';
  document.getElementById('phone-input').focus();
}
</script>

  try{

    var net=prof-exp;
    var cR=dS.filter(function(s){return s.pt==="cash";}).reduce(function(a,s){return a+s.total;},0);
    var uR=dS.filter(function(s){return s.pt==="upi";}).reduce(function(a,s){return a+s.total;},0);
    var udR=dS.filter(function(s){return s.pt==="udhar";}).reduce(function(a,s){return a+s.total;},0);

      if(n)ic[n]=(ic[n]||0)+(i.qty||1);
    });});
    var topItems=Object.entries(ic).sort(function(a,b){return b[1]-a[1];}).slice(0,3);

    // Udhar summary
    var udharTotal=S.udh?S.udh.reduce(function(a,u){return a+(u.bal||0);},0):0;
    var udharCount=S.udh?S.udh.filter(function(u){return (u.bal||0)>0;}).length:0;

        +'</div>'

          +'<div style="font-family:Outfit,sans-serif;font-size:16px;font-weight:800;color:#1A0A00;letter-spacing:-.01em">'+timeStr+'</div>'

function rBillTiles(){
  var BCATS=["Recent"].concat(getPCats());
  var pillsEl=G("bill-cat-pills");
  if(pillsEl)pillsEl.innerHTML=BCATS.map(function(cat){
    var on=_bCat===cat;
    return '<button onclick="bCat(\''+cat+'\')" style="background:'+(on?"var(--p)":"#f1f5f9")+';color:'+(on?"#fff":"#64748b")+';border:none;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit">'+cat+'</button>';
  }).join("");

  var prods;
  if(_bCat==="Recent"){
    var rids=[];
    var revSales=[].concat(S.sales).reverse();
    revSales.forEach(function(s){s.items&&s.items.forEach(function(i){if(rids.indexOf(i.pid)<0)rids.push(i.pid);});});
    prods=rids.map(function(id){return S.prods.find(function(p){return p.id===id;});}).filter(Boolean).slice(0,20);
    if(!prods.length)prods=S.prods.slice(0,20);
  } else {
    prods=S.prods.filter(function(p){return p.cat===_bCat;});
  }

  var tilesEl=G("bill-tiles");
  if(!tilesEl)return;

  tilesEl.innerHTML=prods.map(function(p){
    var inCart=S.cart.find(function(i){return i.id===p.id;});
    var qty=inCart?inCart.q:0;
    var out=p.qty<=0;
    var bg  = qty>0?"#FFF3E8":"#fff";
    var bdr = qty>0?"2.5px solid var(--p)":out?"1.5px solid #fca5a5":"1.5px solid #cbd5e1";

    // Bottom action: stepper if in cart, + button if not, OUT badge if empty
    var bottomAction;
    if(out){
      bottomAction='<span style="font-size:10px;color:#ef4444;font-weight:800;background:#fef2f2;padding:3px 8px;border-radius:6px">OUT</span>';
    } else if(qty>0){
      // Zomato-style stepper: [ - qty + ]
      bottomAction=''
        +'<div style="display:flex;align-items:center;gap:0;background:var(--p);border-radius:10px;overflow:hidden">'
          +'<button onclick="tCI('+p.id+')" style="width:30px;height:30px;background:transparent;color:#fff;font-size:20px;font-weight:700;border:none;cursor:pointer;line-height:1;padding:0;flex-shrink:0">-</button>'
          +'<span style="color:#fff;font-size:14px;font-weight:800;min-width:18px;text-align:center">'+qty+'</span>'
          +'<button onclick="aTC('+p.id+')" style="width:30px;height:30px;background:transparent;color:#fff;font-size:20px;font-weight:700;border:none;cursor:pointer;line-height:1;padding:0;flex-shrink:0">+</button>'
        +'</div>';
    } else {

// BAHI KHATA
function rLedger(){
  var h=subH("&#x1F4D6; Bahi Khata — Roz Ka Hisaab","ga");
  var days=[];for(var i=0;i<30;i++){var d=new Date();d.setDate(d.getDate()-i);days.push(d.toISOString().split("T")[0]);}
  h+='<div style="padding:9px 13px 80px">';
  var gT2=0,gP=0,gB=0;
  days.forEach(function(day){
    var dS=S.sales.filter(s=>s.date===day);if(!dS.length)return;
    var rev=dS.reduce((a,s)=>a+s.total,0),prof=dS.reduce((a,s)=>a+s.profit,0);
    var exp=S.exps.filter(e=>e.date===day).reduce((a,e)=>a+e.amt,0);
    var cashR=dS.filter(s=>s.pt==="cash").reduce((a,s)=>a+s.total,0);
    var upiR=dS.filter(s=>s.pt==="upi").reduce((a,s)=>a+s.total,0);
    var udR=dS.filter(s=>s.pt==="udhar").reduce((a,s)=>a+s.total,0);
    gT2+=rev;gP+=(prof-exp);gB+=dS.length;
    var dObj=new Date(day),isToday=day===td(),isYest=day===new Date(new Date()-86400000).toISOString().split("T")[0];
    var label=isToday?"Aaj":isYest?"Kal":dObj.toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"});
    h+='<div style="background:#fff;border-radius:13px;padding:13px;margin-bottom:9px;box-shadow:0 1px 5px rgba(0,0,0,.06);border-left:4px solid '+(isToday?"#E65C00":isYest?"#6B4226":"#F0DCC8")+'">';
    h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">';
    h+='<div><div style="font-weight:700;font-size:14px;color:'+(isToday?"#E65C00":isYest?"#6366f1":"#1a1a1a")+'">'+label+'</div><div style="font-size:11px;color:#9ca3af">'+dS.length+' bill'+(dS.length>1?"s":"")+'</div></div>';
    h+='<div style="text-align:right"><div style="font-weight:700;font-size:18px">'+fc(rev)+'</div><div style="font-size:12px;color:#16a34a;font-weight:600">Faayda: '+fc(prof-exp)+'</div></div></div>';
    h+='<div style="display:flex;gap:6px;flex-wrap:wrap">';
    if(cashR>0)h+='<span style="font-size:11px;font-weight:700;background:#f0fdf4;color:#16a34a;padding:3px 9px;border-radius:20px">&#x1F4B5; Naqdh '+fc(cashR)+'</span>';
    if(upiR>0)h+='<span style="font-size:11px;font-weight:700;background:#eef2ff;color:#6366f1;padding:3px 9px;border-radius:20px">&#x1F4F2; UPI '+fc(upiR)+'</span>';
    if(udR>0)h+='<span style="font-size:11px;font-weight:700;background:#fffbeb;color:#d97706;padding:3px 9px;border-radius:20px">&#x1F4D2; Udhar '+fc(udR)+'</span>';
    if(exp>0)h+='<span style="font-size:11px;font-weight:700;background:#fef2f2;color:#dc2626;padding:3px 9px;border-radius:20px">&#x1F4B8; Kharcha '+fc(exp)+'</span>';
    h+='</div></div>';
  });
  if(gT2===0){h+='<div style="text-align:center;padding:44px 0"><div style="font-size:44px;margin-bottom:9px">&#x1F4D5;</div><div style="color:#9ca3af;font-size:14px">Koi bhi bill nahi<br>Quick Bill se becho!</div></div>';}
  else{h+='<div style="background:linear-gradient(135deg,#d97706,#b45309);border-radius:14px;padding:14px;margin-bottom:9px"><div style="color:#fde68a;font-size:11px;font-weight:600">Pichhle 30 Din Ka Kul</div><div style="color:#fff;font-size:26px;font-weight:700;margin:4px 0">'+fc(gT2)+'</div><div style="color:#fed7aa;font-size:13px;font-weight:600">Kul Faayda: '+fc(gP)+' &middot; '+gB+' bills</div></div>';}
  h+='</div>';G("pg-more").innerHTML=h;
  var eb=G("lang-en-btn");if(eb)eb.onclick=function(){setLang("en");};
  var hb=G("lang-hi-btn");if(hb)hb.onclick=function(){setLang("hi");};
}

function processVoiceOrder(transcript){
  var btn=document.getElementById("mic-btn");
  if(btn){btn.innerHTML=tr("voiceBtn");btn.classList.remove("mic-active");}
  vibe(10);
  var t0=transcript.toLowerCase().trim();
  toast(isHi()?"&#x1F3A4; Suna: \""+transcript+"\"":"&#x1F3A4; Heard: \""+transcript+"\"");

  // ── Desi Hindi patterns ─────────────────────────────────────────
  // "do wala gold flake de" / "ek packet lays dena" / "teen biscuit"
  t0=t0
    .replace(/\b(de|dena|dedo|de do|chahiye|lena|lijiye|wala|wali|wale|please|bhai|ji)\b/gi,"")
    .replace(/\b(packet|pack|pcs?|piece|pieces|ka|ke|ki|bhi|ek number)\b/gi,"")
    .trim();

  // Voice commands
  if(/\b(clear|saaf|khali|hatao|nikal)\b/.test(t0)){
    S.cart=[];uCB();rBillTiles();
    setTimeout(function(){toast(isHi()?"&#x1F9F9; Cart saaf!":"&#x1F9F9; Cart cleared!");},1200);return;
  }
  if(/\b(total|kitna|amount|kitne ka)\b/.test(t0)){
    setTimeout(function(){toast("Total: "+fc(cT()));},1200);return;
  }
  if(/\b(cash|naqdh|nakad|naqad)\b/.test(t0)&&/\b(pay|le lo|liya|de do|done|ho gaya)\b/.test(t0)){
    setTimeout(function(){quickPay("cash");},1200);return;
  }
  if(/\b(upi|phonepay|gpay|paytm|online)\b/.test(t0)){
    setTimeout(function(){quickPay("upi");},1200);return;
  }
  if(/\b(udhar|credit|baad mein|khata)\b/.test(t0)){
    setTimeout(function(){oUdharSel();},1200);return;
  }

  // Number words — extended Desi Hindi
  var numWords={
    "ek":1,"ekk":1,"one":1,"1":1,
    "do":2,"doh":2,"two":2,"to":2,"2":2,
    "teen":3,"tin":3,"three":3,"3":3,
    "char":4,"chaar":4,"four":4,"4":4,"for":4,
    "paanch":5,"panch":5,"five":5,"5":5,
    "chhe":6,"chha":6,"six":6,"6":6,
    "saat":7,"sat":7,"seven":7,"7":7,
    "aath":8,"ath":8,"eight":8,"8":8,
    "nau":9,"nine":9,"9":9,
    "das":10,"ten":10,"10":10,
    "barah":12,"twelve":12,"12":12,
    "bees":20,"bis":20,"twenty":20,"20":20
  };

  function extractQty(phrase){
    var words=phrase.split(/\s+/);
    for(var i=0;i<words.length;i++){
      var n=parseInt(words[i]);
      if(!isNaN(n)&&n>0&&n<=50)
        return{qty:n,rest:words.filter(function(_,j){return j!==i;}).join(" ")};
      if(numWords[words[i]])
        return{qty:numWords[words[i]],rest:words.filter(function(_,j){return j!==i;}).join(" ")};
    }
    return{qty:1,rest:phrase};
  }

  function scoreProduct(prod,search){
    if(!search||search.length<2)return 0;
    var pn=prod.name.toLowerCase();
    var pnFlat=pn.replace(/\s+/g,"").replace(/[()]/g,"");
    var sFlat=search.replace(/\s+/g,"");
    if(pn===search||pnFlat===sFlat)return 100;
    if(pn.includes(search)||pnFlat.includes(sFlat))return 85;
    if(search.includes(pn)||sFlat.includes(pnFlat))return 80;
    var sWords=search.split(/\s+/).filter(function(w){return w.length>=2;});
    var pWords=pn.split(/\s+/);
    var wm=0;
    sWords.forEach(function(sw){
      pWords.forEach(function(pw){
        if(pw===sw)wm+=3;
        else if(pw.startsWith(sw)||sw.startsWith(pw))wm+=2;
        else if(pw.includes(sw)||sw.includes(pw))wm+=1;
      });
      if(pnFlat.includes(sw))wm+=1;
    });
    if(wm>0)return Math.min(75,wm*15);
    // Prefix fuzzy
    if(sFlat.length>=3&&pnFlat.length>=3){
      var ov=0;
      for(var i2=0;i2<Math.min(sFlat.length,pnFlat.length);i2++){
        if(sFlat[i2]===pnFlat[i2])ov++;else break;
      }
      if(ov>=3)return Math.min(45,ov*8);
    }
    return 0;
  }

  var parts=t0.split(/\s+(?:aur|and|or|\+)\s+|,\s*/i)
    .map(function(p){return p.trim();}).filter(function(p){return p.length>1;});
  if(!parts.length)parts=[t0];

  var results=[];
  parts.forEach(function(part){
    var qData=extractQty(part);
    var search=qData.rest.replace(/\s+/g," ").trim();
    if(!search||search.length<2)return;
    var bestScore=0,bestProd=null;
    // Check starred first (priority boost)
    S.prods.forEach(function(p){
      var s=scoreProduct(p,search);
      if(isStar(p.id))s=Math.min(100,s+10); // star boost
      if(s>bestScore){bestScore=s;bestProd=p;}
    });
    if(bestProd&&bestScore>=10)results.push({prod:bestProd,qty:qData.qty});
  });

  setTimeout(function(){
    if(results.length>0){
      results.forEach(function(r){for(var i=0;i<r.qty;i++)aTC(r.prod.id);});
      toast("&#x2705; "+results.map(function(r){return r.qty+"x "+r.prod.name.split("(")[0].trim();}).join(", "));
    } else {
      toast(isHi()?"\""+transcript+"\" \u2014 match nahi hua":"\""+transcript+"\" \u2014 not found");
    }
  },1200);
}

function sendDailyWaSummary(){

  var cR=dS.filter(function(s){return s.pt==="cash";}).reduce(function(a,s){return a+s.total;},0);
  var uR=dS.filter(function(s){return s.pt==="upi";}).reduce(function(a,s){return a+s.total;},0);
