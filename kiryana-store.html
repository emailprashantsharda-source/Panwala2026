.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.hs{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}

.go{background:linear-gradient(150deg,#f97316,#c2410c)}
.gp{background:linear-gradient(135deg,#7c3aed,#6d28d9)}

.nt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 0 7px;gap:2px;background:none;color:#9ca3af;position:relative;font-size:10px;font-weight:700;cursor:pointer}
.nt.on{color:#f97316}
.ntb{position:absolute;top:0;left:50%;transform:translateX(-50%);width:24px;height:3px;border-radius:2px;background:#f97316;display:none}
.nt.on .ntb{display:block}
.ni{font-size:21px}
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;align-items:flex-end;justify-content:center}
#ov.show{display:flex}
#md{background:#fff;width:100%;max-width:520px;border-radius:24px 24px 0 0;max-height:92vh;overflow-y:auto}
#mh{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #f0e8d8;position:sticky;top:0;background:#fff;z-index:1}
#mh b{font-size:15px}
#mc{width:30px;height:30px;border-radius:50%;background:#fef3c7;cursor:pointer;font-size:16px}
#mb{padding:18px}

  {id:30,name:"Baba Premium Pack",nameHi:"baba premium",cat:"Gutka/Tobacco",sup:"Baba",cp:400,sp:500,qty:3,min:1,unit:"piece",exp:""},
  // ITC Toffees / Confectionery
  {id:31,name:"Candyman Toffee",nameHi:"candyman toffee",cat:"Candy",sup:"ITC",cp:0.7,sp:1,qty:200,min:50,unit:"piece",exp:""},
  {id:32,name:"Candyman Fantastik",nameHi:"candyman fantastik",cat:"Candy",sup:"ITC",cp:3.5,sp:5,qty:100,min:30,unit:"piece",exp:""},
  {id:33,name:"Candyman Sourz",nameHi:"candyman sourz",cat:"Candy",sup:"ITC",cp:3.5,sp:5,qty:100,min:30,unit:"piece",exp:""},
  {id:34,name:"Mint-O Fresh",nameHi:"mint o fresh",cat:"Candy",sup:"ITC",cp:1.4,sp:2,qty:150,min:50,unit:"piece",exp:""},
  {id:35,name:"Eclairs (ITC)",nameHi:"eclairs itc",cat:"Candy",sup:"ITC",cp:1.4,sp:2,qty:200,min:50,unit:"piece",exp:""},
];
const DC=[{id:1,name:"Ramesh Kumar",phone:"9876543210"},{id:2,name:"Sunita Devi",phone:"9123456780"},{id:3,name:"Mohan Lal",phone:"9988776655"}];
const DS2=[{id:1,name:"ITC Distributor",phone:"9988776655",products:"Cigarettes",owed:0},{id:2,name:"DS Group",phone:"9977665544",products:"Gutka",owed:1200}];

let S={prods:lg("kp",DP),sales:lg("ks",[]),purch:lg("kpu",[]),exps:lg("ke",[]),custs:lg("kc",DC),udh:lg("ku",[]),sups:lg("ksu",DS2),cDs:lg("kcd",[]),store:lg("kst","My Pan Shop"),cart:[],tab:"dashboard",sub:null,uSel:null};

// Stock filters — JS state only, NEVER read from DOM
let SF={s:"",cat:"All",st:"All",so:"name"};
// Stock filter helpers — called from onclick to avoid quote nesting bugs
function sfCat(c){SF.cat=c;rSL();}
function sfSt(v){SF.st=v;rSL();}
function sfSo(v){SF.so=v;rSL();}
function sfRst(){SF.s="";SF.cat="All";SF.st="All";SF.so="name";var e=G("sf-s");if(e)e.value="";rSL();}
function sfSearch(){var e=G("sf-s");if(e){SF.s=e.value;}rSL();}

let ST={v:{},cat:"All",s:""};
function stCat(c){ST.cat=c;rSTake();}
function stRst(){ST.v={};rSTake();toast("Counts reset!");}

function gT(t){S.tab=t;S.sub=null;S.uSel=null;document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));G("pg-"+t).classList.add("active");document.querySelectorAll(".nt").forEach(b=>b.classList.remove("on"));G("nt-"+t).classList.add("on");render();}
function gS(sub){S.sub=sub;if(!["bill","stock","udhar"].includes(sub)){document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));G("pg-more").classList.add("active");document.querySelectorAll(".nt").forEach(b=>b.classList.remove("on"));G("nt-more").classList.add("on");S.tab="more";}render();}
function render(){var t=S.tab;if(t==="dashboard")rDash();else if(t==="bill")rBill();else if(t==="stock")rStock();else if(t==="udhar")rUdhar();else if(t==="more")rMore();uAD();uCB();}

function alCnt(){var now=new Date(),in7=new Date(now);in7.setDate(now.getDate()+7);return S.prods.filter(p=>p.qty<=p.min).length+S.prods.filter(p=>p.exp&&new Date(p.exp)<=in7).length;}
function uAD(){var ac=alCnt(),d=G("adot");d.style.display=ac>0?"flex":"none";d.textContent=ac;}

function tCD(){return S.cDs.find(d=>d.date===td())}
function cmpCD(base){var day=td(),tS=S.sales.filter(s=>s.date===day);var cs=tS.filter(s=>s.pt==="cash").reduce((a,s)=>a+s.total,0);var et=S.exps.filter(e=>e.date===day).reduce((a,e)=>a+e.amt,0);var pt=S.purch.filter(p=>p.date===day).reduce((a,p)=>a+p.total,0);return{cs,et,pt,exp:(base||0)+cs-et-pt};}
function rfCD(){var cd=tCD();if(!cd)return;var c=cmpCD(cd.open);Object.assign(cd,c);sA();}

function cBal(cid){var x=S.udh.filter(u=>u.cid===cid);return x.filter(u=>u.type==="debit").reduce((a,u)=>a+u.amt,0)-x.filter(u=>u.type==="credit").reduce((a,u)=>a+u.amt,0);}
function tUO(){return S.custs.reduce((a,c)=>a+Math.max(0,cBal(c.id)),0);}

function aTC(pid){var p=S.prods.find(x=>x.id===pid);if(!p||p.qty<=0)return;var ex=S.cart.find(i=>i.id===pid);if(ex)ex.q++;else S.cart.push({id:pid,name:p.name,q:1,unit:p.unit,cp:p.cp,sp:p.sp});uCB();toast("Added!");if(S.tab==="bill")rBP();}
function uC(pid,q){if(q<=0)S.cart=S.cart.filter(i=>i.id!==pid);else{var i=S.cart.find(x=>x.id===pid);if(i)i.q=q;}uCB();rCI();if(S.tab==="bill")rBP();}
function clC(){S.cart=[];uCB();if(S.tab==="bill")rBP();}
function cT(){return S.cart.reduce((a,i)=>a+i.sp*i.q,0);}
function cPr(){return S.cart.reduce((a,i)=>a+(i.sp-i.cp)*i.q,0);}
function cCt(){return S.cart.reduce((a,i)=>a+i.q,0);}
function uCB(){var cnt=cCt();G("cb").style.display=cnt>0?"block":"none";if(cnt>0){G("cbg").textContent=cnt;G("ct").textContent=fc(cT());G("cp2").textContent="+"+fc(cPr())+" profit";}var pg=G("pg-bill");if(pg)pg.style.paddingBottom=cnt>0?"155px":"82px";}
function tCI(){var p=G("ci");var show=p.style.display!=="block";p.style.display=show?"block":"none";if(show)rCI();}

// ── DASHBOARD ──
function waDaySummary(){
  var now=new Date(),dS=S.sales.filter(s=>s.date===td());
  var rev=dS.reduce((a,s)=>a+s.total,0),prof=dS.reduce((a,s)=>a+s.profit,0);
  var exp=S.exps.filter(e=>e.date===td()).reduce((a,e)=>a+e.amt,0),net=prof-exp;
  var cR=dS.filter(s=>s.pt==="cash").reduce((a,s)=>a+s.total,0);

  var udR=dS.filter(s=>s.pt==="udhar").reduce((a,s)=>a+s.total,0);
  waS("*"+S.store+" — Daily Summary*\nDate: "+now.toLocaleDateString("en-IN")+"\n\nSales: "+fc(rev)+"\nProfit: "+fc(net)+"\nCash: "+fc(cR)+" | UPI: "+fc(uR)+" | Udhar: "+fc(udR)+"\nBills: "+dS.length);
}

function rDash(){
  var day=td(),now=new Date();
  var dS=S.sales.filter(s=>s.date===day);
  var rev=dS.reduce((a,s)=>a+s.total,0),prof=dS.reduce((a,s)=>a+s.profit,0);
  var exp=S.exps.filter(e=>e.date===day).reduce((a,e)=>a+e.amt,0),net=prof-exp;
  var cR=dS.filter(s=>s.pt==="cash").reduce((a,s)=>a+s.total,0);
  var uR=dS.filter(s=>s.pt==="upi").reduce((a,s)=>a+s.total,0);
  var udR=dS.filter(s=>s.pt==="udhar").reduce((a,s)=>a+s.total,0);
  var in7=new Date(now);in7.setDate(now.getDate()+7);
  var lowP=S.prods.filter(p=>p.qty<=p.min),expP=S.prods.filter(p=>p.exp&&new Date(p.exp)<=in7);

function rBillTiles(){
  // Category pills
  var BCATS = ["Recent","Paan","Cigarettes","Gutka/Tobacco","Mouth Freshener","Cold Drinks","Candy","Snacks","Accessories"];
  var pillsH = BCATS.map(function(c){
    var on = _bCat === c;
    return '<button onclick="bCat(\''+c+'\')" class="chip" style="background:'+(on?"#f97316":"#f3f4f6")+';color:'+(on?"#fff":"#6b7280")+';border:none">'+c+'</button>';
  }).join("");
  var pillsEl = G("bill-cat-pills");
  if(pillsEl) pillsEl.innerHTML = pillsH;

  // Get products for this category
  var prods;
  if(_bCat === "Recent"){
    var rids = [];
    [...S.sales].reverse().forEach(s => s.items && s.items.forEach(i => { if(!rids.includes(i.pid)) rids.push(i.pid); }));
    prods = rids.slice(0,16).map(id => S.prods.find(p => p.id===id)).filter(Boolean);
    // If not enough recent, fill with first prods
    if(prods.length < 12){
      S.prods.forEach(p => { if(!prods.find(x=>x.id===p.id)) prods.push(p); });
      prods = prods.slice(0,16);
    }
  } else {
    prods = S.prods.filter(p => p.cat === _bCat);
  }

  var tilesH = prods.map(function(p){
    var ic = S.cart.find(i => i.id===p.id);
    var qty = ic ? ic.q : 0;
    var out = p.qty <= 0;
    return '<div onclick="'+(out?'':'aTC('+p.id+')')+'" style="background:#fff;border-radius:14px;padding:13px 11px;box-shadow:0 1px 5px rgba(0,0,0,.06);cursor:'+(out?'not-allowed':'pointer')+';opacity:'+(out?.5:1)+';position:relative;border:2px solid '+(qty>0?'#f97316':'transparent')+';min-height:90px;display:flex;flex-direction:column;justify-content:space-between">' +
      (qty>0 ? '<div style="position:absolute;top:-8px;right:-8px;width:22px;height:22px;border-radius:50%;background:#f97316;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(249,115,22,.4)">'+qty+'</div>' : '') +
      '<div>' +
        '<div style="font-size:22px;margin-bottom:5px">'+({"Paan":"🌿","Cigarettes":"🚬","Gutka/Tobacco":"🌾","Mouth Freshener":"💨","Cold Drinks":"🥤","Candy":"🍬","Snacks":"🍟","Accessories":"🔧","Other":"📦"}[p.cat]||"📦")+'</div>' +
        '<div style="font-weight:700;font-size:12px;line-height:1.3;color:#1a1a1a">'+es(p.name)+'</div>' +
        (out ? '<div style="font-size:10px;font-weight:700;color:#dc2626;margin-top:3px">Out of stock</div>' : '') +
      '</div>' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:7px">' +
        '<span style="font-size:13px;font-weight:700;color:#f97316">'+fc(p.sp)+'</span>' +
        (qty>0 ? '<button onclick="event.stopPropagation();bRmv('+p.id+')" style="width:22px;height:22px;border-radius:6px;background:#fef2f2;color:#dc2626;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center">-</button>' : '') +
      '</div>' +
    '</div>';
  }).join("");

  var tilesEl = G("bill-tiles");
  if(tilesEl) tilesEl.innerHTML = tilesH || '<div style="grid-column:1/-1;text-align:center;padding:44px 0;color:#9ca3af">No products in this category</div>';

  // Update total bar
  var cnt = cCt(), tot = cT();
  var totalEl = G("bill-total");
  if(totalEl) totalEl.textContent = fc(tot);
  var cntEl = G("bill-items-count");
  if(cntEl) cntEl.textContent = cnt > 0 ? cnt+" item"+(cnt>1?"s":"")+" in cart" : "Tap items to add";

  // Update pay buttons with amount
  var bc = G("btn-cash"), bu = G("btn-upi");

}

// Override aTC to also refresh tiles
var _origATC = aTC;
function aTC(pid){
  var p=S.prods.find(x=>x.id===pid);if(!p||p.qty<=0)return;
  var ex=S.cart.find(i=>i.id===pid);
  if(ex)ex.q++;else S.cart.push({id:pid,name:p.name,q:1,unit:p.unit,cp:p.cp,sp:p.sp});
  uCB();
  if(S.tab==="bill") rBillTiles();
}

function quickPay(pt){
  if(!S.cart.length){ toast("Add items first!"); return; }
  if(pt === "udhar"){ oUdharSel(); return; }
  // Direct save — no modal for cash/upi
  var items = S.cart.map(i=>({pid:i.id,qty:i.q,price:i.sp,cost:i.cp,unit:i.unit}));
  var sale = {id:gid(),date:td(),items:items,total:cT(),profit:cPr(),pt:pt};
  S.sales.push(sale);
  S.cart.forEach(i=>{var p=S.prods.find(x=>x.id===i.id);if(p)p.qty=Math.max(0,p.qty-i.q);});
  var savedTotal = sale.total;
  S.cart=[];rfCD();sA();uCB();uAD();
  // Show success flash
  var icon = pt==="cash" ? "💵" : "📲";
  var label = pt==="cash" ? "Cash" : "UPI";
  toast(icon+" "+label+" sale — "+fc(savedTotal)+" saved!");
  rBillTiles();
}

function rSL(){

  last7.forEach(function(d){var tot=d.c+d.u+d.ud;var tH=tot>0?Math.max(tot/maxB*50,4):0;var cH=tot>0?d.c/tot*tH:0;var uH=tot>0?d.u/tot*tH:0;var udH=tot>0?d.ud/tot*tH:0;h+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:1px"><div style="width:100%;display:flex;flex-direction:column;justify-content:flex-end;height:50px;border-radius:4px 4px 0 0;overflow:hidden">'+(udH>0?'<div style="height:'+udH+'px;background:#d97706"></div>':'')+(uH>0?'<div style="height:'+uH+'px;background:#6366f1"></div>':'')+(cH>0?'<div style="height:'+cH+'px;background:#16a34a"></div>':'')+(tot===0?'<div style="height:2px;background:#f3f4f6"></div>':'')+'</div><div style="font-size:8px;color:'+(d.today?"#6366f1":"#9ca3af")+';font-weight:'+(d.today?700:400)+'">'+d.l+'</div></div>';});
  h+='</div></div>';
  h+='<button onclick="waRpt()" style="width:100%;background:#f0fdf4;border:1.5px solid #86efac;border-radius:14px;padding:13px;display:flex;align-items:center;justify-content:center;gap:9px;cursor:pointer"><span style="font-size:18px">&#x1F4E4;</span><span style="font-weight:700;font-size:13px;color:#15803d">Share Report on WhatsApp</span></button>';
  h+='</div>';
  G("pg-more").innerHTML=h;
}

function rAlerts(){
  var now=new Date(),in7=new Date(now);in7.setDate(now.getDate()+7);
  var low=S.prods.filter(p=>p.qty<=p.min),ex7=S.prods.filter(p=>p.exp&&new Date(p.exp)<=in7);
  var dead=S.prods.filter(p=>{if(p.qty<=0)return false;var last=S.sales.filter(s=>s.items&&s.items.some(i=>i.pid===p.id)).sort((a,b)=>b.date.localeCompare(a.date))[0];if(!last&&S.sales.length>10)return true;if(!last)return false;return Math.ceil((now-new Date(last.date))/864e5)>30;});
  var all=low.map(p=>({e:"&#x26A0;&#xFE0F;",msg:p.name,sub:p.qty+" "+p.unit+" left — needs reorder",c:"#dc2626",bg:"#fef2f2"})).concat(ex7.map(p=>{var d=dX(p.exp);return{e:"&#x23F0;",msg:p.name,sub:d<=0?"EXPIRED — remove from shelf":"Expires in "+d+" days",c:"#d97706",bg:"#fffbeb"};})).concat(dead.map(p=>({e:"&#x1F9CA;",msg:p.name,sub:"No sales in 30+ days — "+p.qty+" in stock",c:"#6366f1",bg:"#eef2ff"})));
  var h=subH("Alerts and Reminders","gr");
  h+='<div style="padding:13px 13px 0;display:flex;flex-direction:column;gap:7px">';
  if(all.length===0)h+='<div style="text-align:center;padding:64px 0"><div style="font-size:48px;margin-bottom:10px">&#x2705;</div><div style="color:#6b7280;font-size:14px;font-weight:600">All good! No alerts today</div></div>';
  all.forEach(a=>{h+='<div style="background:'+a.bg+';border-radius:14px;padding:14px;display:flex;align-items:flex-start;gap:12px"><div style="font-size:24px">'+a.e+'</div><div style="flex:1"><div style="font-weight:700;font-size:13px;color:'+a.c+'">'+es(a.msg)+'</div><div style="font-size:11px;color:#6b7280;margin-top:3px">'+a.sub+'</div></div></div>';});
  if(low.length>0)h+='<button onclick="oRO()" style="width:100%;padding:11px;border-radius:13px;font-weight:700;color:#fff;font-size:13px;background:#25d366;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:4px"><span>&#x1F4E4;</span> Send Reorder List on WhatsApp</button>';
  h+='</div>';
  G("pg-more").innerHTML=h;
}

function rSups(){
  var h=subH("Supplier Accounts","gs");
  h+='<div style="padding:13px 13px 0"><button onclick="aSM()" style="width:100%;padding:12px;border-radius:13px;font-weight:700;color:#fff;font-size:13px;background:#475569;cursor:pointer;margin-bottom:11px">+ Add Supplier</button>';
  if(S.sups.length===0)h+='<div style="text-align:center;padding:44px 0;color:#9ca3af">No suppliers yet</div>';
  S.sups.forEach(s=>{h+='<div class="card" style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px"><div><div style="font-weight:700;font-size:13px">'+es(s.name)+'</div><div style="font-size:11px;color:#8b7355;margin-top:2px">'+es(s.phone||"")+'</div><div style="font-size:11px;color:#8b7355">'+es(s.products||"")+'</div></div><div style="text-align:right"><div style="font-weight:700;color:'+(s.owed>0?"#dc2626":"#16a34a")+';font-size:15px">'+fc(s.owed)+'</div><div style="font-size:11px;color:#8b7355">you owe them</div></div></div><div style="display:flex;gap:7px">'+(s.phone?'<a href="tel:'+s.phone+'" style="padding:6px 12px;border-radius:9px;font-size:11px;font-weight:700;background:#f0fdf4;color:#16a34a;text-decoration:none">&#x1F4DE; Call</a>':'')+(s.phone?' <a href="https://wa.me/91'+s.phone+'" target="_blank" style="padding:6px 12px;border-radius:9px;font-size:11px;font-weight:700;background:#f0fdf4;color:#25d366;text-decoration:none">&#x1F4E4; WhatsApp</a>':'')+(s.owed>0?' <button onclick="pSM('+s.id+')" style="padding:6px 12px;border-radius:9px;font-size:11px;font-weight:700;background:#fef2f2;color:#dc2626;cursor:pointer">Record Payment</button>':'')+'</div></div>';});
  h+='</div>';G("pg-more").innerHTML=h;
}
function aSM(){oM("Add Supplier",'<label class="lbl">Name</label><input id="sf-n" class="inp" placeholder="ITC Distributor"/><label class="lbl">Phone (for WhatsApp)</label><input id="sf-p" class="inp" type="tel" placeholder="10-digit mobile"/><label class="lbl">Products</label><input id="sf-pr" class="inp" placeholder="e.g. Cigarettes, Gutka"/><button class="pbtn" onclick="svSup()" style="background:#475569">Save Supplier</button>');}
function svSup(){var n=(G("sf-n").value||"").trim();if(!n)return;S.sups.push({id:gid(),name:n,phone:G("sf-p").value||"",products:G("sf-pr").value||"",owed:0});sA();cM();rSups();toast("Added!");}
function pSM(id){var s=S.sups.find(x=>x.id===id);oM("Record Payment",'<div style="text-align:center;background:#f9f5f0;border-radius:13px;padding:13px;margin-bottom:13px"><div style="font-weight:700;font-size:15px">'+es(s.name)+'</div><div style="font-size:13px;color:#dc2626;margin-top:3px">You owe: '+fc(s.owed)+'</div></div><label class="lbl">Amount Paid (Rs.)</label><input id="sp-a" class="inp" type="number" placeholder="Payment amount" style="font-size:22px;text-align:center;font-weight:700"/><button class="pbtn" onclick="svSP('+id+')" style="background:#16a34a">Record Payment</button>');}
function svSP(id){var amt=Number((G("sp-a")||{}).value);if(!amt)return;var s=S.sups.find(x=>x.id===id);if(s)s.owed=Math.max(0,s.owed-amt);sA();cM();rSups();toast("Payment recorded!");}

function rSets(){
  G("pg-more").innerHTML=subH("Settings","gs")+'<div style="padding:13px 13px 0;display:flex;flex-direction:column;gap:11px"><div class="card" style="margin:0"><label class="lbl">Store Name</label><input id="st-n" class="inp" value="'+es(S.store)+'" placeholder="My Pan Shop"/><button class="pbtn" onclick="svSets()" style="background:#475569">Save</button></div><div class="card" style="margin:0"><div style="font-weight:700;margin-bottom:9px">App Info</div>'+[["Version","3.0 — Pan Shop Edition"],["Products",S.prods.length],["Total Bills",S.sales.length],["Customers",S.custs.length]].map(([l,v])=>'<div style="display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid #f5ebe0"><span style="color:#6b5c3e">'+l+'</span><span style="font-weight:600">'+v+'</span></div>').join("")+'</div><div class="card" style="margin:0"><div style="font-weight:700;margin-bottom:3px;color:#dc2626">Reset Data</div><div style="font-size:12px;color:#6b7280;margin-bottom:11px">Use carefully — data cannot be recovered</div><button onclick="showRstP()" style="width:100%;padding:11px;border-radius:11px;font-weight:700;font-size:12px;background:#fef2f2;color:#dc2626;border:1.5px solid #fecaca;cursor:pointer;margin-bottom:8px">Reset Products to Pan Shop Defaults</button><button onclick="showRstA()" style="width:100%;padding:11px;border-radius:11px;font-weight:700;font-size:12px;background:#fef2f2;color:#dc2626;border:1.5px solid #fecaca;cursor:pointer">Clear ALL Data (Fresh Start)</button></div></div>';
}
function svSets(){var sn=(G("st-n")||{}).value||"My Pan Shop";S.store=sn;sA();toast("Saved!");rSets();}
function showRstP(){oM("Reset Products",'<div style="text-align:center;padding:13px;background:#fef2f2;border-radius:13px;margin-bottom:14px"><div style="font-size:36px;margin-bottom:8px">&#x26A0;&#xFE0F;</div><div style="font-weight:700;font-size:15px;color:#dc2626">Reset all products?</div><div style="font-size:12px;color:#6b7280;margin-top:5px">Your sales and customers are kept. Only product list resets.</div></div><button class="pbtn" onclick="rstP()" style="background:#dc2626;margin-bottom:8px">Yes, Reset Products</button><button class="pbtn" onclick="cM()" style="background:#6b7280;margin-top:0">Cancel</button>');}
function showRstA(){oM("Clear All Data",'<div style="text-align:center;padding:13px;background:#fef2f2;border-radius:13px;margin-bottom:14px"><div style="font-size:36px;margin-bottom:8px">&#x1F6A8;</div><div style="font-weight:700;font-size:15px;color:#dc2626">Delete everything?</div><div style="font-size:12px;color:#6b7280;margin-top:5px">All sales, products, customers will be permanently deleted.</div></div><button class="pbtn" onclick="rstA()" style="background:#dc2626;margin-bottom:8px">Yes, Delete Everything</button><button class="pbtn" onclick="cM()" style="background:#6b7280;margin-top:0">Cancel</button>');}
function rstP(){
  S.prods=JSON.parse(JSON.stringify(DP));
  try{localStorage.removeItem("kp");}catch(e){}
  sA();rSets();uAD();
  toast("Products reset to Pan Shop defaults!");
}
function rstA(){
  ["kp","ks","kpu","ke","kc","ku","ksu","kcd","kst"].forEach(function(k){try{localStorage.removeItem(k);}catch(e){}});
  location.reload();
}

// ── INIT ──
render();

</script>
